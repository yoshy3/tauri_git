name: publish

on:
  push:
    tags:
      - "*"
      - "**"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name to use for the release"
        required: true
        default: "v0.2.2-dry-run"
      release_draft:
        description: "Create the GitHub release as a draft"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            args: ""
          - name: macOS Arm64
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          releaseName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          releaseBody: "See the assets to download this version and install."
          generateReleaseNotes: true
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name, '-') }}
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.release_draft || false }}
          args: ${{ matrix.args }}
